services:
  - type: web
    name: ashare-daily-review
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ashare_replay/ui/streamlit_app.py --server.address=0.0.0.0 --server.port=$PORT
    envVars:
      - key: APP_MODE
        value: demo
      - key: APP_TIMEZONE
        value: Asia/Shanghai
      - key: REAL_PROVIDER
        value: akshare
      - key: DATABASE_URL
        value: sqlite:///work/data/ashare_replay.sqlite3
      - key: REPORT_OUTPUT_DIR
        value: outputs/reports
      - key: CONFIG_PATH
        value: configs/default_config.json
      - key: APP_PASSWORD
        sync: false
      - key: LLM_ENABLED
        value: false
